<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinobu Chat | Interactive Loop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="chat-layout">
        {% include 'partials/navbar.html' %}

        <main class="chat-panel" style="position: relative; overflow: hidden; background: transparent;">
            <div class="chat-bg"></div>
            <header class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-avatar">S</div>
                    <div>
                        <h3 style="font-size: 1.1rem; letter-spacing: 0.5px;">Interactive Loop</h3>
                        <div class="status-badge">
                            <div class="status-dot"></div>
                            <span>Agent Online</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="message agent">
                    <span>Hello! I am Shinobu, your personal operations agent. My systems are fully initialized. How can I assist you today?</span>
                    <span class="ts">System Online</span>
                </div>
            </div>

            <div class="chat-input-area">
                <div id="reply-preview" class="reply-preview">
                    <div class="reply-preview-content" id="reply-preview-text">Replying to...</div>
                    <button class="cancel-reply" id="cancel-reply">×</button>
                </div>
                
                <!-- File Mention Dropdown -->
                <div id="file-mention-dropdown" class="file-mention-dropdown" style="display: none;"></div>

                <form id="chat-form" class="input-row">
                    <div class="mode-select-wrapper">
                        <select id="mode-selector" class="mode-select-dropdown">
                            <option value="auto" selected>Auto</option>
                            <option value="search">Search</option>
                            <option value="chat">Chat</option>
                            <option value="agent">Agent</option>
                        </select>
                    </div>
                    
                    <button type="button" class="attach-btn" id="attach-btn" title="Attach File">
                        <i class="bi bi-paperclip"></i>
                    </button>
                    <input type="file" id="file-upload" style="display: none;">

                    <input type="text" id="user-input" placeholder="Enter natural language command..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <span>Execute</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- File Preview Template -->
    <template id="file-preview-template">
        <div class="file-preview-card">
            <div class="file-preview-header">
                <span class="file-name">filename.pdf</span>
                <button class="close-preview">×</button>
            </div>
            <div class="file-preview-body">
                <!-- PDF or image will be injected here -->
            </div>
            <div class="file-preview-actions">
                <button class="open-file-btn">Open File</button>
                <button class="save-as-btn">Save As...</button>
            </div>
        </div>
    </template>

    <div id="file-preview-modal" class="file-preview-modal" aria-hidden="true">
        <div class="file-preview-modal-backdrop" id="file-preview-modal-backdrop"></div>
        <div class="file-preview-modal-dialog" role="dialog" aria-modal="true" aria-label="File preview">
            <div class="file-preview-modal-header">
                <span id="file-preview-modal-title">File Preview</span>
                <button id="file-preview-modal-close" class="file-preview-modal-close" type="button" aria-label="Close preview">×</button>
            </div>
            <div id="file-preview-modal-body" class="file-preview-modal-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
