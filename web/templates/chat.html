<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinobu Chat | Interactive Loop</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .chat-layout {
            height: 100vh;
            display: grid;
            grid-template-columns: 300px 1fr;
            background: var(--darker);
        }
        .nav-bar {
            padding: 2rem;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .nav-link {
            padding: 1rem;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .nav-link:hover, .nav-link.active {
            background: var(--glass);
            color: var(--pink);
        }
    </style>
</head>
<body>
    <div class="chat-layout">
        <nav class="nav-bar">
            <h2 style="color: var(--purple-light); margin-bottom: 2rem;">Shinobu Suite</h2>
            <a href="/" class="nav-link">🏠 Home</a>
            <a href="/chat" class="nav-link active">💬 Live Chat</a>
            <a href="/results" class="nav-link">📋 Results Card</a>
            <a href="/analysis" class="nav-link">📈 Analysis</a>
            
            <div style="margin-top: auto; padding: 1rem; background: var(--glass); border-radius: 16px; border: 1px solid var(--glass-border);">
                <p id="session-id" style="font-family: monospace; font-size: 0.7rem; opacity: 0.5;">Session ID: --</p>
            </div>
        </nav>

        <main class="chat-area" style="padding: 2rem;">
            <div class="glass-panel" style="height: 100%;">
                <div class="chat-header">
                    <h3>Butterfly Interface Loop</h3>
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                        <span>Agent Online</span>
                    </div>
                </div>

                <div class="chat-messages" id="chat-messages">
                    <div class="message agent">
                        Operation center ready. How can I assist with your personal OS operations today?
                        <span class="ts">System Online</span>
                    </div>
                </div>

                <div class="chat-input-container">
                    <form id="chat-form" class="input-wrapper">
                        <input type="text" id="user-input" placeholder="Initiate operation..." autocomplete="off">
                        <button type="submit">Execute</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
