<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinobu Chat | Interactive Loop</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div class="chat-layout">
        <aside class="nav-bar">
            <div class="nav-brand">
                <div class="nav-brand-icon">S</div>
                <h2>Shinobu OS</h2>
            </div>
            
            <a href="/" class="nav-link">🏠 Overview</a>
            <a href="/chat" class="nav-link active">💬 Live Chat</a>
            <a href="/search" class="nav-link">🔍 Search</a>
            <a href="/results" class="nav-link">📋 Operation Cards</a>
            <a href="/analysis" class="nav-link">📈 Analytics</a>
            
            <div class="nav-session">
                <p id="session-id">Session: LOADING</p>
            </div>
        </aside>

        <main class="chat-panel" style="position: relative; overflow: hidden; background: transparent;">
            <div class="chat-bg"></div>
            <header class="chat-header">
                <div class="chat-header-left">
                    <div class="chat-avatar">S</div>
                    <div>
                        <h3 style="font-size: 1.1rem; letter-spacing: 0.5px;">Interactive Loop</h3>
                        <div class="status-badge">
                            <div class="status-dot"></div>
                            <span>Agent Online</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="message agent">
                    <span>Hello! I am Shinobu, your personal operations agent. My systems are fully initialized. How can I assist you today?</span>
                    <span class="ts">System Online</span>
                </div>
            </div>

            <div class="chat-input-area">
                <div id="reply-preview" class="reply-preview">
                    <div class="reply-preview-content" id="reply-preview-text">Replying to...</div>
                    <button class="cancel-reply" id="cancel-reply">×</button>
                </div>
                <form id="chat-form" class="input-row">
                    <div class="mode-select-wrapper">
                        <select id="mode-selector" class="mode-select-dropdown">
                            <option value="auto" selected>🧠 Auto</option>
                            <option value="search">🔍 Search</option>
                            <option value="chat">💬 Chat</option>
                            <option value="agent">🤖 Agent</option>
                        </select>
                    </div>
                    <input type="text" id="user-input" placeholder="Enter natural language command..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <span>Execute</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
